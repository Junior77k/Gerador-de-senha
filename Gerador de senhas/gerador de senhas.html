<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senha</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(45deg, #ff7971, #c3d366, #0074D9);
        background-size: 600% 600%;
        animation: animacao 10s ease infinite;
    }

    @keyframes animacao {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Conteúdo centralizado */
    .container {
        text-align: center;
        margin-top: 60px;
    }

    .container h1 {
        font-size: 70px;
        text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .container p {
        font-size: 25px;
        margin-bottom: 30px;
    }

    /* Botão */
    .btn {
        padding: 14px 58px;
        font-size: 24px;
        background: #0057ff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #003ec7;
    }

    /* Barra inferior */
    .senha {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 600px;
        background: #222;
        color: #fff;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        border-radius: 10px 10px 0 0;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Gerador de Senha</h1>
    <p>Gerar senha aleatória</p>
    <input type="number" id="tamanho" placeholder="Quantos dígitos?" style="padding:10px; font-size:18px; width: 200px;">
    <br><br>
    <button class="btn" onclick="gerarSenha()">Clique</button>
</div>

<div class="senha" id="resultado">A senha aparecerá aqui...</div>

<script>
function gerarSenha() {
    const tamanho = parseInt(document.getElementById('tamanho').value);
    if (isNaN(tamanho) || tamanho <= 0) {
        alert('Digite um número válido!');
        return;
    }

    // Letras, números e símbolos adicionados
    const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#!^$*&';
    let senha = '';
    for (let i = 0; i < tamanho; i++) {
        senha += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
    }

    document.getElementById('resultado').innerText = senha;
}
</script>

</body>
</html>
